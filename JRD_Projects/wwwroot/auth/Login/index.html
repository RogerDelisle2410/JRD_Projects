<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRD Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col items-center justify-start min-h-screen pt-10">

    <div class="w-full flex justify-end items-center gap-4 px-6 mt-4">

        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="en" id="lang-en">
            <span id="label-en" data-i18n="lang_en">English</span>
        </label>

        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="fr" id="lang-fr">
            <span id="label-fr" data-i18n="lang_fr">Français</span>
        </label>

        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="es" id="lang-es">
            <span id="label-es" data-i18n="lang_es">Español</span>
        </label>
    </div>

    <h1 data-i18n="log" class="text-3xl font-bold text-gray-800 mt-6">
        JRD Projects
    </h1>

    <div class="bg-white p-8 rounded shadow-md w-96 mt-6">
        <h2 data-i18n="log2" class="text-2xl font-bold mb-4 text-center">Login</h2>

        <form id="loginForm" class="space-y-4">

            <div class="flex">
                <input class="w-full p-2 border rounded-l"
                       type="text"
                       id="emailUser"
                       placeholder="username"
                       data-i18n-placeholder="usernm"
                       required>
                <span class="p-2 border rounded-r bg-gray-100">@JRD.com</span>
            </div>

            <div class="relative">
                <input class="w-full p-2 border rounded"
                       type="password"
                       id="password"
                       placeholder="Password"
                       data-i18n-placeholder="pass"
                       required>

                <span id="togglePassword"
                      class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500">
                    <!-- eye icons -->
                </span>
            </div>

            <button type="submit" data-i18n="log3"
                    class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                Login
            </button>
        </form>

        <p class="mt-4 text-center">
            <a data-i18n="Create" href="/auth/Register/index.html" class="text-blue-600 hover:underline">
                Create an account
            </a>
        </p>
    </div> 

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            console.log("LOGIN SCRIPT EXECUTED");

            const form = document.getElementById("loginForm");
            if (!form) {
                console.error("ERROR: loginForm not found");
                return;
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const email = getFullEmail();
                const password = document.getElementById("password").value;

                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                let text = await response.text();
                console.log("RAW RESPONSE:", text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    alert("Server error: " + text);
                    return;
                }

                if (response.ok) {
                    sessionStorage.setItem("token", data.token);
                    sessionStorage.setItem("userEmail", email);
                    window.location.href = "/index.html";
                } else {
                    alert(data.detail || "Login failed");
                }
            });
        });
    </script>

    <script>
        function getFullEmail() {
            return document.getElementById("emailUser").value + "@JRD.com";
        }
    </script>

    <script>
        document.getElementById("togglePassword").addEventListener("click", () => {
            const input = document.getElementById("password");
            const eyeOpen = document.getElementById("eyeOpen");
            const eyeClosed = document.getElementById("eyeClosed");

            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";

            eyeOpen.classList.toggle("hidden", !isHidden);
            eyeClosed.classList.toggle("hidden", isHidden);
        });
    </script>

    <script type="module">
        import { initLanguage, translations } from "/js/language.js";
        initLanguage();
        // expose translations for the non-module script above
        window.currentTranslations = translations;
    </script>
</body>
</html>
