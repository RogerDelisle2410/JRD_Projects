<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JRD Projects - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
    <button id="helpBtn"
            class="absolute top-4 right-4 bg-blue-600 text-white w-8 h-8 rounded-full
               flex items-center justify-center hover:bg-blue-700">
        ?
    </button>

    <div class="absolute top-10 w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800">JRD Projects - Login</h1>
    </div>

    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>
        <!--<span class="text-[10px] text-gray-500">Use fictitious email and password</span>-->
        <!-- THIS IS THE ONLY FORM -->
        <form id="loginForm" class="space-y-4">
            <div class="flex">
                <input class="w-full p-2 border rounded-l"
                       type="text"
                       id="emailUser"
                       placeholder="username"
                       required>
                <span class="p-2 border rounded-r bg-gray-100">@fake.com</span>
            </div>

            <div class="relative">
                <input class="w-full p-2 border rounded"
                       type="password"
                       id="password"
                       placeholder="Password"
                       required>

                <span id="togglePassword"
                      class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500">

                    <!-- Eye (show) -->
                    <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                         class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>

                    <!-- Eye Slash (hide) -->
                    <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                         class="w-5 h-5 hidden">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c1.79 0 3.487-.41 4.98-1.137M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.774 3.162 10.066 7.5a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l12.544 12.544" />
                    </svg>

                </span>
            </div>


            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                Login
            </button>
        </form>


        <p class="mt-4 text-center">
            <a href="/auth/Register/index.html" class="text-blue-600 hover:underline">Create an account</a>
        </p>
    </div>

    <!-- REMOVE THE EXTRA </form> YOU HAD HERE -->
    <!-- PUT THE SCRIPT RIGHT HERE -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            console.log("LOGIN SCRIPT EXECUTED");

            const form = document.getElementById("loginForm");
            if (!form) {
                console.error("ERROR: loginForm not found");
                return;
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const email = getFullEmail();   // <-- FIXED HERE
                /*const email = document.getElementById("email").value;*/
                const password = document.getElementById("password").value;

                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                let text = await response.text();
                console.log("RAW RESPONSE:", text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    alert("Server error: " + text);
                    return;
                }

                if (response.ok) {
                    // ⭐ FIXED: use sessionStorage
                    sessionStorage.setItem("token", data.token);

                    // go to dashboard
                    window.location.href = "/index.html";
                } else {
                    alert(data.detail || "Login failed");
                }
            });
        });

    </script>
    <script>
        function getFullEmail() {
            return document.getElementById("emailUser").value + "@fake.com";
        }
    </script>
    <script>
        document.getElementById("togglePassword").addEventListener("click", () => {
            const input = document.getElementById("password");
            const eyeOpen = document.getElementById("eyeOpen");
            const eyeClosed = document.getElementById("eyeClosed");

            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";

            eyeOpen.classList.toggle("hidden", !isHidden);
            eyeClosed.classList.toggle("hidden", isHidden);
        });
    </script>
</body>
</html>
