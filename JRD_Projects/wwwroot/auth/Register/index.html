<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRD Projects - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col items-center justify-start min-h-screen pt-10">

    <div class="w-full flex justify-end items-center gap-4 px-6 mt-4">
        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="en" id="lang-en">
            <span id="label-en" data-i18n="lang_en">English</span>
        </label>

        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="fr" id="lang-fr">
            <span id="label-fr" data-i18n="lang_fr">Français</span>
        </label>

        <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lang" value="es" id="lang-es">
            <span id="label-es" data-i18n="lang_es">Español</span>
        </label>
    </div>

    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 data-i18n="create2" class="text-2xl font-bold mb-4 text-center">Create Account</h2>
        <span data-i18n="fictitious" class="text-[12px] text-gray-500">Use fictitious email and password</span>

        <form id="registerForm" class="space-y-4">
            <div class="flex">
                <input class="w-full p-2 border rounded-l"
                       type="text"
                       id="emailUser"
                       placeholder="username"
                       data-i18n-placeholder="usernm2"
                       required>
                <span class="p-2 border rounded-r bg-gray-100">@JRD.com</span>
            </div>
            <p id="emailMsg" class="text-sm h-5 mt-1"></p>

            <input class="w-full p-2 border rounded"
                   type="password"
                   id="password"
                   data-i18n-placeholder="pass2"
                   placeholder="Password"
                   required>

            <input class="w-full p-2 border rounded"
                   type="password"
                   id="confirmPassword"
                   data-i18n-placeholder="pass3"
                   placeholder="Confirm Password"
                   required>

            <label class="flex items-center space-x-2 text-sm text-gray-600">
                <input type="checkbox" id="togglePassword" class="h-4 w-4">
                <span data-i18n="show">Show password</span>
            </label>

            <p id="passwordMatchMsg" class="text-sm mt-1 h-5"></p>

            <button data-i18n="create3"
                    type="submit"
                    class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
                Create Account
            </button>
        </form>

        <p class="mt-4 text-center">
            <a data-i18n="back" href="/auth/Login/index.html" class="text-blue-600 hover:underline">
                Back to Login
            </a>
        </p>
    </div>

    <script>
        // core DOM refs
        const emailUser = document.getElementById("emailUser");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const msg = document.getElementById("passwordMatchMsg");
        const form = document.getElementById("registerForm");
        const toggle = document.getElementById("togglePassword");
        const emailMsg = document.getElementById("emailMsg");
        const createBtn = form.querySelector("button[type='submit']");

        function disableButton() {
            createBtn.disabled = true;
            createBtn.classList.add("opacity-50", "cursor-not-allowed");
        }

        function enableButton() {
            createBtn.disabled = false;
            createBtn.classList.remove("opacity-50", "cursor-not-allowed");
        }

        function isValidUsername(username) {
            return /^[A-Za-z0-9._-]+$/.test(username);
        }

        function validateAll() {
            const user = emailUser.value.trim();
            const passMatch = password.value === confirmPassword.value && password.value.length > 0;

            // email message
            if (user.length === 0) {
                emailMsg.textContent = "";
                emailMsg.className = "text-sm h-5 mt-1";
            }
            else if (!isValidUsername(user)) {
                emailMsg.textContent = currentTranslations.invalidUser;
                emailMsg.className = "text-red-600 text-sm h-5 mt-1";
            }
            else {
                emailMsg.textContent = currentTranslations.validUser;
                emailMsg.className = "text-green-600 text-sm h-5 mt-1";
            }

            // password match message
            if (confirmPassword.value.length === 0) {
                msg.textContent = "";
                msg.className = "text-sm mt-1 h-5";
            }
            else if (passMatch) {
                msg.textContent = currentTranslations.passMatch;
                msg.className = "text-green-600 text-sm mt-1 h-5";
            }
            else {
                msg.textContent = currentTranslations.passNoMatch;
                msg.className = "text-red-600 text-sm mt-1 h-5";
            }

            // button enable/disable
            if (!isValidUsername(user) || !passMatch) {
                disableButton();
            } else {
                enableButton();
            }
        }

        // initial state
        disableButton();

        // input listeners
        emailUser.addEventListener("input", validateAll);
        password.addEventListener("input", validateAll);
        confirmPassword.addEventListener("input", validateAll);

        // show/hide password
        toggle.addEventListener("change", function () {
            const show = this.checked;
            password.type = show ? "text" : "password";
            confirmPassword.type = show ? "text" : "password";
        });

        function getFullEmail() {
            const user = emailUser.value.trim();
            if (!isValidUsername(user)) return null;
            return user + "@JRD.com";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = getFullEmail();
            if (!email) {
                alert(currentTranslations.alert_invalidUser);
                return;
            }

            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password: password.value })
            });

            let text = await response.text();
            console.log("RAW REGISTER RESPONSE:", text);

            let data;
            try {
                data = JSON.parse(text);
            } catch {
                alert(currentTranslations.alert_serverError + " " + text);
                return;
            }

            if (response.ok) {
                alert(currentTranslations.alert_accountCreated);
                window.location.href = "/auth/Login/index.html";
            } else {
                alert(data.detail || currentTranslations.alert_registrationFailed);
            }
        });
    </script>

    <style>
        input[type="password"]::-webkit-textfield-decoration-container {
            display: none !important;
        }

        input[type="password"]::-ms-reveal {
            display: none !important;
        }
    </style>

    <script type="module">
        import { initLanguage, translations } from "/js/language.js";
        initLanguage();
        // expose translations for the non-module script above
        window.currentTranslations = translations;
    </script>

</body>
</html>
